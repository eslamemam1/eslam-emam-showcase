name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        env:
          GITHUB_PAGES: "true"
        run: npm run build

      - name: Prepare Pages files
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll
          # Fail the job if the build still points at source files
          if grep -q 'src/main.tsx' dist/index.html; then
            echo "Build output still references /src/main.tsx"
            cat dist/index.html
            exit 1
          fi
          echo "Built index.html:"
          cat dist/index.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
